name: Deploy Dashboard to Cloudflare Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      run_etl:
        description: Run ETL pipeline before build (requires DB secrets)
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: dashboard/.node-version
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: ./dashboard
        run: npm ci

      - name: Build static site
        working-directory: ./dashboard
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 5efdc2e85ba37ce38b948335387786bb
          workingDirectory: ./dashboard
          command: pages deploy out --project-name=pharmacy-retail-sales-analytics --branch ${{ github.head_ref || 'master' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
